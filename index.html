<!DOCTYPE html>
<html>
<head>
    <title>Online Job Application Form</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>

    <div class="form-container">

        <h2>Online Job Application Form (Web)</h2>

        <form>

            <div class="form-group">
                <label for="fullName">Full Name:</label>
                    <input type="text" id="fullName" name="fullName"
                        placeholder="Enter Your Full Name" required>
            </div>


            <div class="form-group">
                <label for="fatherName">Father's Name:</label>
                    <input type="text" id="fatherName" name="fatherName" 
                        placeholder="Enter Your Father's Name" required>
            </div>


            <div class="form-group">
                <label for="dateOfBirth">Date of Birth:</label>
                    <input type="date" id="dateOfBirth" name="dateOfBirth"
                         placeholder="Enter Your Date of Birth" required>
            </div>


            <div class="form-group">
                <label for="email">Email Address:</label>
                    <input type="email" id="email" name="email"
                        placeholder="Enter Your Email Address" required>
            </div>


            <div class="form-group">
                <label for="city">City:</label>
                    <input type="text" id="city" name="city"
                        placeholder="Enter Your City's Name" required>
            </div>


            <!-- <div class="form-group">
                <label for="pincode">Pincode:</label>
                    <input type="number" id="pincode" name="pincode"
                        placeholder="Enter Your Pincode" required>
            </div> -->


            <div class="form-group">
                <label for="job-role">Select Job Role:</label>
                        <select id="job-role" name="job-role" required>
                            <option value="">Select Job Role</option>
                            <option value="web_developer">Web Developer</option>
                            <option value="react">React.Js Developer</option>
                            <option value="node">Node.js Developer</option>
                            <option value="frontend">Frontend Developer</option>
                            <option value="full_stack">Full Stack Developer</option>
                        </select>            
            </div>


            <div class="form-group">
                <label for="address">Address:</label>
                    <textarea id="address" name="address" rows="4" col="50" 
                        placeholder="Enter Your Complete Address" required> </textarea>
            </div>


            <div class="form-group">
                <label for="resume">Upload Your Resume:</label>
                    <input type="file" id="resume" name="resume" 
                        accept=".pdf,.doc,.docx" required>
            </div>


            <button type="submit">Apply Now</button>


        </form>

    </div>

</body>
</html>
